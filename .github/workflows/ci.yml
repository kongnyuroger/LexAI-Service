name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Run tests with coverage
        run: npm run test:cov
        env:
          JWT_ACCESS_SECRET: ci-test-access-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret
          DATABASE_URL: postgresql://lexai:lexai_password@localhost:5432/lexai_db
          OPENAI_API_KEY: sk-test-placeholder-not-used-in-unit-tests
